<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Clean">
<title>Bad Habit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>

.svg-icon{display:inline-block;width:1em;height:1em;vertical-align:-0.125em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
<script>
const md={name:"Bad Habit Tracker",short_name:"Bad Habits",display:"standalone",background_color:"#0A0E1A",theme_color:"#0A0E1A",start_url:".",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='120' fill='%237C3AED'/%3E%3Cellipse cx='256' cy='220' rx='120' ry='90' fill='%23A78BFA'/%3E%3Ccircle cx='220' cy='200' r='22' fill='white'/%3E%3Ccircle cx='292' cy='200' r='22' fill='white'/%3E%3Ccircle cx='226' cy='206' r='11' fill='%230A0E1A'/%3E%3Ccircle cx='298' cy='206' r='11' fill='%230A0E1A'/%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}]};

document.write(`<link rel="manifest" href="${URL.createObjectURL(b)}">`);

<style>
/* ══════════════════════════════════
   TOKENS
══════════════════════════════════ */
:root{
  --bg:#0A0E1A;--bg2:#131929;--bg3:#1E2640;--bg4:#252d47;
  --t1:#F0F4FF;--t2:#8892B0;--t3:#4A5578;
  --bd:#2A3354;--bd2:#3a4570;
  --violet:#7C3AED;--violet-l:#A78BFA;--violet-d:#6D28D9;
  --coral:#F43F5E;--amber:#F59E0B;--mint:#10B981;--sky:#0EA5E9;--pink:#EC4899;
  --hero-grad:linear-gradient(135deg,#1a0a3d 0%,#0d1f3c 100%);
  --hero-glow:rgba(124,58,237,.25);
  --card-bg:var(--bg2);--card-bd:var(--bd);
  --input-bg:var(--bg3);--tabbar-bg:rgba(10,14,26,.92);
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme="light"]{
  --bg:#FAFAF8;--bg2:#FFFFFF;--bg3:#F3F1FF;--bg4:#EDE9FE;
  --t1:#1A1A2E;--t2:#5B5B7A;--t3:#9B99BB;
  --bd:#E2DDFF;--bd2:#C7C0F5;
  --violet:#7C3AED;--violet-l:#7C3AED;--violet-d:#6D28D9;
  --coral:#F43F5E;--amber:#D97706;--mint:#059669;--sky:#0284C7;--pink:#DB2777;
  --hero-grad:linear-gradient(135deg,#EDE9FE 0%,#FCE7F3 100%);
  --hero-glow:rgba(124,58,237,.12);
  --card-bg:#FFFFFF;--card-bd:#E2DDFF;
  --input-bg:#F5F3FF;--tabbar-bg:rgba(250,250,248,.94);
}
/* ══════════════════════════════════
   BASE
══════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  padding:2rem;
  transition:opacity .7s ease,transform .7s ease;
}
#splash.hiding{opacity:0;transform:scale(1.04);pointer-events:none}
.splash-iso{animation:splashBob 2s ease-in-out infinite}
@keyframes splashBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.splash-msg{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--t1);text-align:center;max-width:280px;line-height:1.4;animation:fadeInUp .6s .2s both ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.splash-sub{font-size:14px;color:var(--t2);animation:fadeInUp .6s .5s both ease}
.splash-skip{margin-top:8px;background:none;border:1px solid var(--bd);border-radius:99px;padding:8px 20px;color:var(--t2);font-size:13px;cursor:pointer;font-family:inherit;animation:fadeInUp .6s .8s both ease}
.splash-logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;background:linear-gradient(90deg,var(--violet),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fadeInUp .5s both ease}
.splash-progress{width:120px;height:3px;background:var(--bg3);border-radius:99px;overflow:hidden;animation:fadeInUp .6s .9s both ease}
.splash-bar{height:3px;background:linear-gradient(90deg,var(--violet),var(--coral));border-radius:99px;animation:splashLoad 3s linear forwards}
@keyframes splashLoad{from{width:0}to{width:100%}}
/* ── SHELL ── */
#shell{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:var(--safe-top)}
#header{padding:10px 14px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--bd)}
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(52px + var(--safe-bottom))}
#scroll-area.no-scroll{overflow:hidden;padding-bottom:0}
.app-logo{display:flex;align-items:center;gap:9px}
.logo-svg{flex-shrink:0;filter:drop-shadow(0 0 8px rgba(124,58,237,.4))}
.app-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;background:linear-gradient(90deg,var(--violet),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.3px}
.header-actions{display:flex;gap:6px;align-items:center}
.icon-btn{
  width:34px;height:34px;border-radius:10px;border:1px solid var(--bd);
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t2);font-size:17px;transition:all .2s;
}
.icon-btn:active{transform:scale(.88);background:var(--bg4)}
.icon-btn.notif-on{color:var(--amber);border-color:var(--amber);background:rgba(245,158,11,.1)}
/* ── TABBAR ── */
#tabbar{position:fixed;bottom:0;left:0;right:0;padding-bottom:var(--safe-bottom);background:var(--tabbar-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;z-index:50}
.tab{flex:1;padding:5px 0 4px;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;font-family:'Inter',inherit;color:var(--t3);font-size:8px;font-weight:600;letter-spacing:.03em;transition:color .2s}
.tab i{font-size:18px;transition:transform .2s}
.tab.active{color:var(--violet)}
.tab.active i{transform:scale(1.15)}
/* ── MASCOT ── */
.mascot-wrap{
  padding:12px 16px 0;
  display:flex;
  align-items:center;
  gap:12px;
}
.mascot-bubble{
  flex:1;
  background:var(--card-bg);
  border:1.5px solid var(--bd);
  border-radius:16px 16px 16px 4px;
  padding:11px 13px;
  font-size:13px;color:var(--t1);line-height:1.55;
  position:relative;transition:all .3s;
}
.mascot-bubble strong{color:var(--violet)}
/* Tail points left toward Iso — bottom-left of bubble */
.mascot-bubble::after{
  content:'';position:absolute;
  bottom:16px;left:-8px;
  width:8px;height:14px;
  background:var(--card-bg);
  clip-path:polygon(100% 0,100% 100%,0 50%);
}
/* Border part of tail */
.mascot-bubble::before{
  content:'';position:absolute;
  bottom:15px;left:-10px;
  width:10px;height:16px;
  background:var(--bd);
  clip-path:polygon(100% 0,100% 100%,0 50%);
  z-index:-1;
}
.mascot-svg-wrap{flex-shrink:0;cursor:pointer;transition:transform .2s}
.mascot-svg-wrap:active{transform:scale(.88)}
/* ── HERO DASHBOARD ── */
.hero{margin:10px 16px 0;border-radius:16px;background:var(--hero-grad);border:1px solid var(--bd);position:relative;overflow:hidden;padding:12px 14px}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:110px;height:110px;border-radius:50%;background:radial-gradient(circle,var(--hero-glow) 0%,transparent 70%);pointer-events:none}
.hero-stats-row{display:flex;gap:8px;margin-bottom:10px}
.hero-stat{flex:1;background:rgba(255,255,255,.06);border-radius:11px;padding:9px 10px;border:1px solid rgba(255,255,255,.08)}
[data-theme="light"] .hero-stat{background:rgba(255,255,255,.55);border-color:rgba(255,255,255,.7)}
.hero-stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--t1) 20%,var(--violet-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-stat-val.accent{background:linear-gradient(135deg,var(--mint),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-stat-val.warn{background:linear-gradient(135deg,var(--amber),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-stat-lbl{font-size:9px;color:var(--t2);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
.hero-week{display:flex;align-items:center;gap:0}
.hero-week-lbl{font-size:9px;color:var(--t2);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-right:8px;flex-shrink:0}
.hero-week-days{display:flex;gap:4px;flex:1}
.hero-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.hero-day-name{font-size:8px;color:var(--t3);font-weight:600}
.hero-day-dot{width:100%;aspect-ratio:1;border-radius:5px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.06);max-width:28px}
[data-theme="light"] .hero-day-dot{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.06)}
.hero-day-dot.clean{border:none}
.hero-day-dot.today-ring{box-shadow:0 0 0 2px var(--violet-l)}
.hero-chip{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600}
/* ── SECTION TITLE ── */
.sec-title{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);font-weight:600;margin:16px 16px 8px}
/* ── NOTIF / INSTALL ── */
.install-banner{margin:8px 16px 0;background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.22);border-radius:12px;padding:10px 12px;display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--violet)}
.install-banner span{flex:1;line-height:1.5}.install-banner button{background:none;border:none;color:var(--t2);cursor:pointer;font-size:18px;padding:0;flex-shrink:0}
/* ── CALENDAR ── */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:10px}
.cal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--t1)}
.cal-nav{
  width:36px;height:36px;border-radius:10px;
  background:var(--bg3);border:1px solid var(--bd);
  cursor:pointer;color:var(--t2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all .15s;
}
.cal-nav:active{transform:scale(.88);background:var(--bg4)}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 16px;margin-bottom:4px}
.dow{text-align:center;font-size:10px;color:var(--t3);padding:2px 0;font-weight:600}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 16px}
.day-cell{border-radius:9px;border:1px solid var(--bd);min-height:54px;padding:5px 4px;cursor:pointer;background:var(--card-bg);transition:transform .1s;position:relative;overflow:hidden}
.day-cell:active{transform:scale(.9)}
.day-cell.empty{border-color:transparent;background:transparent;cursor:default}
.day-cell.today{border:1.5px solid var(--violet)}
[data-theme="dark"] .day-cell.today{background:rgba(124,58,237,.08)}
[data-theme="light"] .day-cell.today{background:rgba(124,58,237,.05)}
.day-cell.future{opacity:.22;pointer-events:none}
.day-cell.has-entry{background:var(--bg3)}
.day-num{font-size:10px;font-weight:600;color:var(--t3);margin-bottom:3px;line-height:1}
.day-cell.today .day-num{color:var(--violet)}
.day-cell.has-entry .day-num{color:var(--t1)}
.gem-row{display:flex;flex-wrap:wrap;gap:2px}
.gem{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.gem-all{width:100%;text-align:center;font-size:7px;font-weight:700;color:var(--mint)}
/* ── BOTTOM SHEET ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg2);width:100%;border-radius:22px 22px 0 0;border-top:1px solid var(--bd);padding:10px 18px calc(20px + var(--safe-bottom));animation:slideUp .25s cubic-bezier(.32,.72,0,1);max-height:91vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;border-radius:99px;background:var(--bg4);margin:0 auto 14px}
.sheet-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;color:var(--t1);margin-bottom:3px}
.sheet-sub{font-size:13px;color:var(--t2);margin-bottom:14px;line-height:1.5}
.subs-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.sub-btn{padding:10px;border-radius:12px;border:1.5px solid var(--bd);background:var(--bg3);font-size:12px;color:var(--t1);cursor:pointer;text-align:left;display:flex;align-items:center;gap:7px;font-family:inherit;transition:all .15s;-webkit-user-select:none;user-select:none;width:100%}
.sub-btn:active{transform:scale(.94)}
.sub-btn i.sub-icon{font-size:14px;flex-shrink:0}
.sub-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--bd);flex-shrink:0;transition:all .15s}
.sub-del{position:absolute;top:4px;right:5px;background:none;border:none;color:var(--t3);font-size:13px;cursor:pointer;padding:2px;line-height:1;transition:color .15s}
.sub-del:hover{color:var(--coral)}
.btn-manage{width:100%;margin-top:8px;padding:9px;background:none;border:1px solid var(--bd);border-radius:9px;font-size:12px;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.btn-manage:active{background:var(--bg3)}
.manage-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd)}
.manage-row:last-child{border-bottom:none}
.manage-del-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);border-radius:8px;color:#F43F5E;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .15s}
.manage-del-btn:active{transform:scale(.94);background:rgba(244,63,94,.2)}
.btn-clean-all{
  width:100%;padding:13px;margin-bottom:14px;
  background:linear-gradient(135deg,var(--mint),var(--sky));
  color:#fff;border:none;border-radius:12px;
  font-size:15px;font-weight:700;font-family:'Syne',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 3px 14px rgba(16,185,129,.3);
  transition:transform .15s,opacity .15s;
}
.btn-clean-all:active{transform:scale(.97);opacity:.9}
.btn-clean-all.all-selected{background:var(--bg3);color:var(--t2);box-shadow:none;border:1.5px solid var(--bd)}
.add-custom-row{margin-bottom:14px;padding-top:10px;border-top:1px solid var(--bd)}
.add-custom-label{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.custom-input-wrap{display:flex;gap:7px}
.custom-input{flex:1;background:var(--input-bg);border:1.5px solid var(--bd);border-radius:9px;padding:9px 12px;color:var(--t1);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.custom-input:focus{border-color:var(--violet)}
.custom-input::placeholder{color:var(--t3)}
.btn-add{padding:9px 13px;background:var(--violet);color:#fff;border:none;border-radius:9px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap;transition:all .15s}
.btn-add:active{transform:scale(.94)}
.sheet-actions{display:flex;gap:8px}
.btn-save{flex:1;padding:13px;background:linear-gradient(135deg,var(--violet),var(--coral));color:#fff;border:none;border-radius:12px;font-size:15px;cursor:pointer;font-weight:700;font-family:'Syne',sans-serif;box-shadow:0 4px 18px rgba(124,58,237,.28);transition:transform .15s}
.btn-save:active{transform:scale(.96)}
.btn-cancel{padding:13px 16px;background:var(--bg3);border:1px solid var(--bd);border-radius:12px;font-size:14px;color:var(--t2);cursor:pointer;font-family:inherit}
.btn-cancel:active{transform:scale(.96)}
/* ── STATS ── */
.stats-page{padding:0 16px 16px}
.stat-tabs-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:14px;padding-bottom:2px}
.stat-tabs-scroll::-webkit-scrollbar{display:none}
.stat-tabs{display:flex;gap:6px;white-space:nowrap;width:max-content}
.stat-tab{padding:6px 13px;border-radius:99px;font-size:12px;font-weight:600;border:1.5px solid var(--bd);background:var(--bg2);color:var(--t2);cursor:pointer;font-family:inherit;transition:all .15s}
.stat-tab.active{background:var(--violet);border-color:var(--violet);color:#fff}
.stat-tab:active{transform:scale(.94)}
.rings-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.ring-card{background:var(--card-bg);border:1px solid var(--card-bd);border-radius:14px;padding:13px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all .2s}
.ring-card:active{transform:scale(.95)}
.ring-card.selected{border-width:2px}
.ring-wrap{position:relative;width:78px;height:78px}
.ring-svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg3);stroke-width:7}
.ring-fill{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Syne',sans-serif;font-size:15px;font-weight:800}
.ring-name{font-size:11px;font-weight:600;color:var(--t1);text-align:center}
.ring-meta{font-size:10px;color:var(--t2);text-align:center}
.detail-card{background:var(--card-bg);border:1px solid var(--card-bd);border-radius:14px;padding:14px;margin-bottom:8px}
.detail-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--t1);margin-bottom:12px;display:flex;align-items:center;gap:9px}
.detail-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.dstat{background:var(--bg3);border-radius:10px;padding:9px;text-align:center}
.dstat-val{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--t1)}
.dstat-lbl{font-size:10px;color:var(--t2);margin-top:2px;font-weight:500}
.bar-track{height:7px;background:var(--bg3);border-radius:99px;overflow:hidden}
.bar-fill{height:7px;border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.bar-meta{display:flex;justify-content:space-between;margin-top:4px}
.bar-meta span{font-size:11px;color:var(--t2)}
.heatmap-wrap{margin-bottom:13px}
.heatmap-title{font-size:12px;color:var(--t2);font-weight:500;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.heatmap-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:2px}
.hm-cell{aspect-ratio:1;border-radius:2px;background:var(--bg3)}
.hm-cell.hm-miss{background:rgba(244,63,94,.25)}
/* ── DOW BAR CHART ── */
.dow-bar-chart{display:flex;align-items:flex-end;gap:4px;height:100px;padding-bottom:22px;position:relative}
.dow-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.dow-bar-pct{font-size:8px;color:var(--t2);font-weight:600;height:12px;line-height:12px}
.dow-bar-track{flex:1;width:100%;display:flex;align-items:flex-end;background:var(--bg3);border-radius:4px;overflow:hidden;min-height:4px}
.dow-bar-fill{width:100%;border-radius:4px 4px 0 0;transition:height .6s cubic-bezier(.4,0,.2,1);min-height:2px}
.dow-bar-lbl{font-size:9px;font-weight:600;margin-top:4px}

.month-bar-chart{display:flex;align-items:flex-end;gap:3px;height:100px;padding-bottom:20px}
.month-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.month-bar-pct{font-size:7px;font-weight:700;height:12px;line-height:12px}
.month-bar-track{flex:1;width:100%;display:flex;align-items:flex-end;background:var(--bg3);border-radius:3px;overflow:hidden}
.month-bar-fill{width:100%;border-radius:3px 3px 0 0;transition:height .6s cubic-bezier(.4,0,.2,1);min-height:2px}
.month-bar-lbl{font-size:8px;color:var(--t3);font-weight:500;margin-top:3px}
/* ── MILESTONE CARDS ── */
.milestone-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:var(--card-bg);border:1px solid var(--card-bd);margin-bottom:8px;transition:opacity .2s}
.milestone-card.locked{opacity:.45;filter:grayscale(.6)}
.milestone-icon{font-size:22px;flex-shrink:0;width:32px;text-align:center}
.milestone-body{flex:1;min-width:0}
.milestone-label{font-size:13px;font-weight:600;color:var(--t1)}
.milestone-desc{font-size:11px;color:var(--t2);margin-top:2px}
.milestone-badge{font-size:16px;flex-shrink:0}
/* ── VERLAUF GRID ── */
.verlauf-wrap{padding-bottom:8px}
.vl-header{display:flex;align-items:center;margin-bottom:3px}
.vl-wlbl-spacer{width:36px;flex-shrink:0}
.vl-dow-row{display:grid;grid-template-columns:repeat(7,1fr);flex:1;gap:2px}
.vl-dow{text-align:center;font-size:9px;color:var(--t3);font-weight:600;padding:1px 0}
.vl-row{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.vl-wlbl{width:32px;font-size:9px;color:var(--t3);flex-shrink:0;text-align:right;padding-right:4px}
.vl-days{display:grid;grid-template-columns:repeat(7,1fr);flex:1;gap:2px}
.vl-cell{
  aspect-ratio:1;border-radius:4px;
  background:var(--bg3);
  display:flex;flex-wrap:wrap;
  align-items:center;justify-content:center;
  gap:1px;padding:1px;
  position:relative;
}
.vl-future{opacity:.2}
.vl-empty{background:var(--bg3)}
.vl-all{background:var(--mint);opacity:.85}
.vl-partial{background:var(--bg2);border:1px solid var(--bd)}
.vl-today{box-shadow:0 0 0 1.5px var(--violet-l)}
.vl-dot{width:35%;height:35%;border-radius:50%;flex-shrink:0}
.vl-legend-row{display:flex;flex-wrap:wrap;gap:6px 10px;margin-top:10px;padding-top:8px;border-top:1px solid var(--bd)}
.vl-leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2)}
.vl-leg-all{width:10px;height:10px;border-radius:2px;background:var(--mint);opacity:.85}
.vl-leg-empty{width:10px;height:10px;border-radius:2px;background:var(--bg3)}
.vl-leg-dot-lg{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--t2);font-size:14px}
.empty i{font-size:38px;display:block;margin:0 auto 10px;opacity:.3}
/* ══ EDUCATION CARDS ══ */
.edu-page{display:flex;flex-direction:column;height:calc(100dvh - var(--safe-top) - 54px - var(--safe-bottom) - 52px);padding:0}
.edu-top{padding:6px 16px 4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.edu-nav{display:flex;align-items:center;gap:8px}
.edu-dot{width:6px;height:6px;border-radius:50%;background:var(--bg3);transition:all .25s;cursor:pointer;flex-shrink:0}
.edu-dot.active{width:18px;border-radius:99px}
.edu-arr{width:30px;height:30px;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);transition:all .15s;flex-shrink:0}
.edu-arr:active{transform:scale(.88);background:var(--bg4)}
.edu-arr:disabled{opacity:.3;pointer-events:none}
.edu-counter{font-size:12px;color:var(--t2);font-weight:500;min-width:38px;text-align:center}
.edu-viewport{overflow:hidden;margin:6px 16px 0;border-radius:18px;flex:1;min-height:0}
.edu-track{display:flex;height:100%;transition:transform .38s cubic-bezier(.32,.72,0,1);will-change:transform}
.edu-card{flex-shrink:0;width:100%;height:100%;border-radius:18px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.22);display:flex;flex-direction:column}
.edu-card-header{padding:16px 18px 14px;flex-shrink:0}
.edu-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;background:rgba(255,255,255,.18);color:#fff;margin-bottom:8px}
.edu-card-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;line-height:1.1}
.edu-card-sub{font-size:12px;color:rgba(255,255,255,.72);margin-top:3px}
.edu-card-body{background:var(--card-bg);padding:12px 16px 16px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.edu-section{margin-bottom:11px}
.edu-section:last-child{margin-bottom:0}
.edu-section-title{font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);font-weight:700;margin-bottom:5px}
.edu-section-text{font-size:12px;color:var(--t2);line-height:1.55}
.risk-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.risk-label{font-size:11px;color:var(--t2);width:70px;flex-shrink:0}
.risk-bar-wrap{flex:1;height:5px;background:var(--bg3);border-radius:99px;overflow:hidden}
.risk-bar{height:5px;border-radius:99px}
.risk-val{font-size:10px;font-weight:600;width:26px;text-align:right}
.recovery-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:500;background:var(--bg3);color:var(--t1);margin-bottom:5px;line-height:1.4}
.edu-swipe-hint{font-size:10px;color:var(--t3);text-align:center;padding:4px 0 2px;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-icon{animation:spin 1s linear infinite;opacity:.5}
/* ── GEWOHNHEITEN PAGE ── */
.hab-page{padding:14px 16px 16px}
.hab-add-card{background:var(--card-bg);border:1.5px dashed var(--bd);border-radius:16px;padding:16px;margin-bottom:16px}
.hab-add-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.hab-add-row{display:flex;gap:8px;margin-bottom:8px}
.hab-add-input{flex:1;background:var(--input-bg);border:1.5px solid var(--bd);border-radius:10px;padding:10px 13px;color:var(--t1);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.hab-add-input:focus{border-color:var(--violet)}
.hab-add-input::placeholder{color:var(--t3)}
.hab-add-btn{padding:10px 16px;background:var(--violet);color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap;transition:all .15s}
.hab-add-btn:active{transform:scale(.94)}
.hab-section-title{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);font-weight:700;margin:16px 0 10px}
.hab-list{display:flex;flex-direction:column;gap:8px}
.hab-item{background:var(--card-bg);border:1px solid var(--card-bd);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.hab-item-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.hab-item-label{flex:1;font-size:14px;font-weight:500;color:var(--t1)}
.hab-item-badge{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--bg3);color:var(--t3);font-weight:600}
.hab-item-del{width:30px;height:30px;border-radius:8px;border:1px solid rgba(244,63,94,.25);background:rgba(244,63,94,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#F43F5E;flex-shrink:0;transition:all .15s}
.hab-item-del:active{transform:scale(.9);background:rgba(244,63,94,.15)}
.hab-item-del.disabled{opacity:.25;pointer-events:none}
/* ── TOAST ── */
.toast{position:fixed;top:calc(58px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-10px);background:var(--bg3);border:1px solid var(--bd);border-radius:11px;padding:8px 15px;font-size:13px;font-weight:500;color:var(--t1);z-index:999;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;white-space:nowrap;box-shadow:0 8px 22px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

</head>

let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playTone(f,t='sine',d=.12,v=.13){
  try{const c=getAudio();const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.setValueAtTime(f,c.currentTime);g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d)}catch(e){}
}

// Returns an inline SVG icon for any sub — always visible, no CDN needed
function getSubIcon(s, size=15, color='var(--t2)'){
  const isCustom=customSubs.some(cs=>cs.id===s.id);

  if(!isCustom && SUB_ICONS[s.id]){
    // Default sub — hand-crafted inline SVG
    return`<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">${SUB_ICONS[s.id]}</svg>`;
  }

  // Custom sub — use AI-generated stored SVG
  if(customIcons[s.id]){
    const sized=customIcons[s.id].replace(/width="[^"]*"/,'width="'+size+'"').replace(/height="[^"]*"/,'height="'+size+'"');
    return`<span class="sub-svg-icon" style="flex-shrink:0;width:${size}px;height:${size}px;display:inline-flex;align-items:center;justify-content:center;color:${color}">${sized}</span>`;
  }

  // Fallback: initial letter in a colored circle
  const initial=(s.label||'?')[0].toUpperCase();
  return`<span style="flex-shrink:0;width:${size+2}px;height:${size+2}px;border-radius:50%;background:${s.color}22;border:1.5px solid ${s.color}55;display:inline-flex;align-items:center;justify-content:center;font-size:${Math.round(size*.65)}px;font-weight:700;color:${s.color}">${initial}</span>`;
}

function calcStreak(){
  const now=todayObj();let s=0;
  for(let i=0;i<730;i++){const d=new Date(now);d.setDate(now.getDate()-i);const k=toKey(d.getFullYear(),d.getMonth(),d.getDate());if(data[k]&&data[k].length>0)s++;else if(i>0)break;}
  return s;
}

function computeStats(){
  const subs=getSubs();
  const sortedKeys=Object.keys(data).sort();
  if(!sortedKeys.length)return null;
  const today=todayObj();
  const stats={};
  subs.forEach(s=>{stats[s.id]={cleanDays:0,relapses:0,currentStreak:0,bestStreak:0,totalTracked:0}});
  subs.forEach(s=>{
    const entryDates=sortedKeys.map(k=>({k,isClean:data[k].includes(s.id)}));
    let streak=0,best=0,relapses=0,total=0,prevWasClean=null;
    entryDates.forEach(({isClean})=>{
      if(isClean){total++;streak++;if(streak>best)best=streak;prevWasClean=true;}
      else{if(prevWasClean===true)relapses++;streak=0;prevWasClean=false;}
    });
    let cur=0;
    for(let i=entryDates.length-1;i>=0;i--){if(entryDates[i].isClean)cur++;else break;}
    stats[s.id]={cleanDays:total,relapses,currentStreak:cur,bestStreak:best,totalTracked:entryDates.length};
  });
  return stats;
}

function render(){
  const subs=getSubs();
  const now=new Date();
  if(viewY===undefined){viewY=now.getFullYear();viewM=now.getMonth();}
  const todayStr=todayKey(),nowDate=todayObj();
  const streak=calcStreak();

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const tabId={kalender:'tab-kal',statistik:'tab-stat',gewohnheiten:'tab-hab',education:'tab-edu'}[currentTab];
  if(tabId)document.getElementById(tabId).classList.add('active');
  const sa=document.getElementById('scroll-area');
  if(sa)sa.className=currentTab==='education'?'no-scroll':'';

  const ni=document.getElementById('notif-icon');
  const nb=document.getElementById('notif-btn');
  if(ni){ni.innerHTML=notifEnabled?SVG_BELL_ON:SVG_BELL;}
  if(nb){nb.className='icon-btn'+(notifEnabled?' notif-on':'');}

  let content='';
  if(currentTab==='kalender'){
    const showBanner=isIOS()&&!isStandalone()&&!bannerDismissed;
    const bannerHtml=showBanner?`<div class="install-banner"><i class="ti ti-device-mobile" style="font-size:17px"></i><span>Als App: <strong>Teilen</strong> → <strong>Zum Homescreen</strong></span><button onclick="dismissBanner()">×</button></div>`:'';
    const todayEntry=data[todayStr]||[];
    let chipsHtml='';
    if(todayEntry.length>0){
      todayEntry.slice(0,3).forEach(id=>{const sub=subs.find(s=>s.id===id);if(sub)chipsHtml+=`<div class="hero-chip" style="background:${sub.color}22;color:${sub.color};border:1px solid ${sub.color}44">${sub.label} ✓</div>`;});
      if(todayEntry.length>3)chipsHtml+=`<div class="hero-chip" style="background:var(--bg3);color:var(--t2);border:1px solid var(--bd)">+${todayEntry.length-3}</div>`;
    } else {
      chipsHtml=`<div class="hero-chip" style="background:var(--bg3);color:var(--t2);border:1px solid var(--bd);font-weight:400;font-size:11px">Heute noch kein Eintrag</div>`;
    }
    const msgCat=streak>0&&todayEntry.length>0?'streak':'greet';
    const mascotHtml=`<div class="mascot-wrap">
      <div class="mascot-svg-wrap" onclick="mascotTapped()">${isoSVG(mascotMood,68)}</div>
      <div style="flex:1"><div class="mascot-bubble" id="mascot-bubble">${getMsg(msgCat)}</div></div>
    </div>`;

    const firstDay=new Date(viewY,viewM,1);
    const daysInMonth=new Date(viewY,viewM+1,0).getDate();
    let startDow=firstDay.getDay();startDow=startDow===0?6:startDow-1;
    let cells='';
    for(let i=0;i<startDow;i++)cells+=`<div class="day-cell empty"></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const k=toKey(viewY,viewM,d);
      const cellDate=new Date(viewY,viewM,d);cellDate.setHours(0,0,0,0);
      const isToday=k===todayStr,isFuture=cellDate>nowDate;
      const entry=data[k],hasEntry=entry&&entry.length>0;
      let cls='day-cell';
      if(isToday)cls+=' today';if(isFuture)cls+=' future';if(hasEntry)cls+=' has-entry';
      let inner='';
      if(hasEntry){
        if(entry.length===subs.length)inner=`<div class="gem-all">ALL ✦</div>`;
        else inner=`<div class="gem-row">${entry.map(id=>{const sub=subs.find(s=>s.id===id);return sub?`<div class="gem" style="background:${sub.color}"></div>`:''}).join('')}</div>`;
      }
      const click=isFuture?'':`onclick="openModal('${k}')"`;
      cells+=`<div class="${cls}" ${click}><div class="day-num">${d}</div>${inner}</div>`;
    }

    // ── Stats for hero ──
    const totalEntries=Object.keys(data).length;
    const todayClean=todayEntry.length;
    const todayTotal=subs.length;

    // Best streak ever
    let bestStreak=streak;
    if(Object.keys(data).length>0){
      let run=0;
      Object.keys(data).sort().forEach(k=>{if(data[k]&&data[k].length>0){run++;if(run>bestStreak)bestStreak=run;}else{run=0;}});
    }

    // Current Mon–Sun week (fixed, not rolling)
    const weekDays=['Mo','Di','Mi','Do','Fr','Sa','So'];
    const todayDow=(nowDate.getDay()+6)%7; // 0=Mon … 6=Sun
    const monday=new Date(nowDate);monday.setDate(nowDate.getDate()-todayDow);
    const weekSlots=Array.from({length:7},(_,i)=>{
      const d=new Date(monday);d.setDate(monday.getDate()+i);
      const k=toKey(d.getFullYear(),d.getMonth(),d.getDate());
      const isFutureDay=d>nowDate;
      const isToday=d.getTime()===nowDate.getTime();
      const entry=data[k];
      return{k,entry,isToday,isFutureDay,label:weekDays[i]};
    });
    const weekDotsHtml=weekSlots.map(day=>{
      const hasEntry=day.entry&&day.entry.length>0;
      const allClean=hasEntry&&day.entry.length===subs.length;
      const someClean=hasEntry&&day.entry.length>0;
      let dotStyle='';
      if(day.isFutureDay)dotStyle='opacity:.25';
      else if(allClean)dotStyle=`background:var(--mint);opacity:.95`;
      else if(someClean){
        const firstSub=subs.find(s=>day.entry.includes(s.id));
        if(firstSub)dotStyle=`background:${firstSub.color};opacity:.85`;
      }
      const todayRing=day.isToday?' today-ring':'';
      const cleanCls=someClean?' clean':'';
      return`<div class="hero-day">
        <div class="hero-day-dot${cleanCls}${todayRing}" style="${dotStyle}"></div>
        <div class="hero-day-name" style="${day.isToday?'color:var(--violet-l);font-weight:700':''}">${day.label}</div>
      </div>`;
    }).join('');

    content=`${mascotHtml}
    <div class="hero">
      <div class="hero-stats-row">
        <div class="hero-stat">
          <div class="hero-stat-val">${streak}</div>
          <div class="hero-stat-lbl">🔥 Streak</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-val accent">${todayClean}<span style="font-size:14px;opacity:.6">/${todayTotal}</span></div>
          <div class="hero-stat-lbl">✓ Heute clean</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-val warn">${bestStreak}</div>
          <div class="hero-stat-lbl">⭐ Rekord</div>
        </div>
      </div>
      <div class="hero-week">
        <div class="hero-week-lbl">Weekly Progress</div>
        <div class="hero-week-days">${weekDotsHtml}</div>
      </div>
    </div>
    ${bannerHtml}
    <div class="sec-title">${MONTHS[viewM]} ${viewY}</div>
    <div class="cal-nav-row">
      <button class="cal-nav" onclick="navigate(-1)" title="Vorheriger Monat"><svg class="svg-icon" width="18" height="18" viewBox="0 0 24 24">${SVG_CHEVRON_L}</svg></button>
      <div class="cal-title">${MONTHS[viewM]} ${viewY}</div>
      <button class="cal-nav" onclick="navigate(1)" title="Nächster Monat"><svg class="svg-icon" width="18" height="18" viewBox="0 0 24 24">${SVG_CHEVRON_R}</svg></button>
    </div>
    <div class="dow-row">${DAYS.map(d=>`<div class="dow">${d}</div>`).join('')}</div>
    <div class="day-grid">${cells}</div>`;
  } else if(currentTab==='statistik'){
    content=buildStats();
  } else if(currentTab==='gewohnheiten'){
    content=buildGewohnheiten();
  } else {
    content=buildEdu();
  }

  document.getElementById('root').innerHTML=content;
  renderModal();
  if(currentTab==='statistik')setTimeout(animateRings,50);
  if(currentTab==='education')initEduSwipe();
}

function addHabit(){
  const inp=document.getElementById('hab-input');

  const val=inp.value.trim();

  if(getSubs().find(s=>s.label.toLowerCase()===val.toLowerCase())){showToast('Gibt es schon!');return;}
  const color=CUSTOM_COLORS[customSubs.length%CUSTOM_COLORS.length];
  const id='custom_'+Date.now();
  customSubs.push({id,label:val,icon:'ti-circle-off',color,grad:`linear-gradient(135deg,#374151,${color})`});

}

    `<polygon points="12,2 22,19 2,19"/><text x="12" y="17" text-anchor="middle" font-size="9" font-weight="700" fill="currentColor" stroke="none" font-family="system-ui,sans-serif">${initial}</text>`,
  ];
  return`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">${shapes[hash%shapes.length]}</svg>`;
}

function deleteHabit(id){
  customSubs=customSubs.filter(s=>s.id!==id);
  Object.keys(data).forEach(k=>{data[k]=data[k].filter(sid=>sid!==id)});
  delete customEduData[id];
  delete customIcons[id];
  saveCustomSubs();saveData();saveCustomEdu();saveCustomIcons();
  playDeselect();showToast('Gewohnheit entfernt');
  render();
}

// STATS PAGE
// ════════════════════════════════════════
function buildStats(){
  const sortedKeys=Object.keys(data).sort();
  if(!sortedKeys.length)return`<div class="empty" style="margin-top:2rem"><i class="ti ti-chart-arcs"></i>Noch keine Einträge.<br>Trage erst Tage im Kalender ein.</div>`;
  const stats=computeStats();
  const subs=getSubs();
  const totalTracked=sortedKeys.length;

  const tabs=[
    {id:'rings',label:'Übersicht'},
    {id:'detail',label:'Details'},
    {id:'wochentag',label:'Wochentage'},
    {id:'monat',label:'Monatstrend'},
    {id:'trend',label:'Fortschritt'},
    {id:'meilensteine',label:'Meilensteine'},
  ];
  const tabsHtml=`<div class="stat-tabs-scroll"><div class="stat-tabs">${tabs.map(t=>`<button class="stat-tab${statView===t.id?' active':''}" onclick="setStatView('${t.id}')">${t.label}</button>`).join('')}</div></div>`;

  let view='';

  if(statView==='rings'){
    const ringsHtml=subs.map(s=>{
      const st=stats[s.id];
      const pct=st.totalTracked>0?Math.round((st.cleanDays/st.totalTracked)*100):0;
      const r=35,circ=2*Math.PI*r,offset=circ-(pct/100)*circ;
      const sel=selectedSubStat===s.id;
      return`<div class="ring-card${sel?' selected':''}" onclick="selectStatSub('${s.id}')" style="${sel?`border-color:${s.color}`:''}">
        <div class="ring-wrap"><svg class="ring-svg" width="78" height="78" viewBox="0 0 80 80">
          <circle class="ring-bg" cx="40" cy="40" r="${r}"/>
          <circle class="ring-fill" id="ring-${s.id}" cx="40" cy="40" r="${r}" stroke="${s.color}" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" data-target="${offset}"/>
        </svg><div class="ring-center"><div class="ring-pct" style="color:${s.color}">${pct}%</div></div></div>
        <div class="ring-name">${s.label}</div>
        <div class="ring-meta">${st.cleanDays}d · ${st.relapses}×↩</div>
      </div>`;
    }).join('');
    let detailHtml='';
    if(selectedSubStat){
      const sub=subs.find(s=>s.id===selectedSubStat);
      const st=stats[selectedSubStat];
      const pct=st.totalTracked>0?Math.round((st.cleanDays/st.totalTracked)*100):0;
      detailHtml=`<div class="detail-card" style="border-color:${sub.color}55">
        <div class="detail-name"><i class="ti ${sub.icon}" style="color:${sub.color}"></i>${sub.label}</div>
        <div class="detail-stats">
          <div class="dstat"><div class="dstat-val" style="color:${sub.color}">${st.cleanDays}</div><div class="dstat-lbl">Clean Days</div></div>
          <div class="dstat"><div class="dstat-val" style="color:${sub.color}">${st.currentStreak}</div><div class="dstat-lbl">Aktuell</div></div>
          <div class="dstat"><div class="dstat-val" style="color:${sub.color}">${st.bestStreak}</div><div class="dstat-lbl">Rekord</div></div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${sub.color}"></div></div>
        <div class="bar-meta"><span>${pct}% clean</span><span style="color:${sub.color}">${st.relapses} Rückfall${st.relapses!==1?'e':''}</span></div>
      </div>`;
    }
    view=`<div class="rings-grid">${ringsHtml}</div>${detailHtml}`;
  }

  if(statView==='detail'){
    const rows=subs.map(s=>{
      const st=stats[s.id];
      const pct=st.totalTracked>0?Math.round((st.cleanDays/st.totalTracked)*100):0;
      return`<div class="detail-card">
        <div class="detail-name"><i class="ti ${s.icon}" style="color:${s.color}"></i>${s.label}</div>
        <div class="detail-stats">
          <div class="dstat"><div class="dstat-val" style="color:${s.color}">${st.cleanDays}</div><div class="dstat-lbl">Clean</div></div>
          <div class="dstat"><div class="dstat-val" style="color:${s.color}">${st.currentStreak}</div><div class="dstat-lbl">Streak</div></div>
          <div class="dstat"><div class="dstat-val" style="color:#F43F5E">${st.relapses}</div><div class="dstat-lbl">Rückfälle</div></div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
        <div class="bar-meta"><span>${pct}% clean</span><span>Rekord: ${st.bestStreak}d</span></div>
      </div>`;
    }).join('');
    view=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div class="dstat"><div class="dstat-val">${totalTracked}</div><div class="dstat-lbl">Tage erfasst</div></div>
      <div class="dstat"><div class="dstat-val" style="color:#F43F5E">${subs.reduce((a,s)=>a+stats[s.id].relapses,0)}</div><div class="dstat-lbl">Rückfälle</div></div>
    </div>${rows}`;
  }

  if(statView==='wochentag'){
    const dowNames=['Mo','Di','Mi','Do','Fr','Sa','So'];
    const dowClean=Array(7).fill(0);
    const dowTotal=Array(7).fill(0);
    sortedKeys.forEach(k=>{
      const d=parseKey(k);
      const dow=(d.getDay()+6)%7;
      dowTotal[dow]++;
      if(data[k]&&data[k].length>0)dowClean[dow]++;
    });
    const bars=dowNames.map((name,i)=>{
      const pct=dowTotal[i]>0?Math.round(dowClean[i]/dowTotal[i]*100):0;
      const barH=Math.round((pct/100)*80);
      const isWeekend=i>=5;
      const color=isWeekend?'#F43F5E':'#7C3AED';
      return`<div class="dow-bar-col">
        <div class="dow-bar-pct">${dowTotal[i]>0?pct+'%':''}</div>
        <div class="dow-bar-track"><div class="dow-bar-fill" style="height:${barH}px;background:${color}88;border-top:2px solid ${color}"></div></div>
        <div class="dow-bar-lbl" style="color:${isWeekend?'#F43F5E':'var(--t2)'}">${ name}</div>
      </div>`;
    }).join('');
    const ranked=[...dowNames.map((n,i)=>({n,pct:dowTotal[i]>0?Math.round(dowClean[i]/dowTotal[i]*100):null}))].filter(x=>x.pct!==null).sort((a,b)=>b.pct-a.pct);
    const bestDay=ranked[0],worstDay=ranked[ranked.length-1];
    view=`<div class="detail-card">
      <div class="detail-name" style="margin-bottom:16px">Erfolg nach Wochentag</div>
      <div class="dow-bar-chart">${bars}</div>
      <div style="display:flex;gap:8px;margin-top:14px">
        ${bestDay?`<div class="dstat" style="flex:1;border-color:rgba(124,58,237,.3)"><div class="dstat-val" style="color:var(--violet)">${bestDay.n}</div><div class="dstat-lbl">Bester Tag</div></div>`:''}
        ${worstDay&&worstDay!==bestDay?`<div class="dstat" style="flex:1;border-color:rgba(244,63,94,.3)"><div class="dstat-val" style="color:#F43F5E">${worstDay.n}</div><div class="dstat-lbl">Schwerster Tag</div></div>`:''}
      </div>
      <p style="font-size:11px;color:var(--t3);margin-top:10px">Wochenende in Rot — erkennst du ein Muster?</p>
    </div>`;
  }

  if(statView==='monat'){
    const months={};
    sortedKeys.forEach(k=>{
      const ym=k.slice(0,7);
      if(!months[ym])months[ym]={clean:0,total:0};
      months[ym].total++;
      if(data[k]&&data[k].length>0)months[ym].clean++;
    });
    const monthKeys=Object.keys(months).sort().slice(-12);
    const monthNames=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
    const bars=monthKeys.map(ym=>{
      const m=months[ym];
      const pct=Math.round(m.clean/m.total*100);
      const mo=ym.split('-')[1];
      const label=monthNames[parseInt(mo)-1];
      const color=pct>=80?'#10B981':pct>=50?'#7C3AED':'#F43F5E';
      return`<div class="month-bar-col">
        <div class="month-bar-pct" style="color:${color}">${pct}%</div>
        <div class="month-bar-track"><div class="month-bar-fill" style="height:${Math.round(pct*.7)}px;background:${color}88;border-top:2px solid ${color}"></div></div>
        <div class="month-bar-lbl">${label}</div>
      </div>`;
    }).join('');
    let trendHtml='';
    const lastTwo=monthKeys.slice(-2);
    if(lastTwo.length===2){
      const prev=Math.round(months[lastTwo[0]].clean/months[lastTwo[0]].total*100);
      const curr=Math.round(months[lastTwo[1]].clean/months[lastTwo[1]].total*100);
      const diff=curr-prev;
      trendHtml=`<div style="margin-top:12px;padding:10px 12px;background:${diff>=0?'rgba(16,185,129,.1)':'rgba(244,63,94,.08)'};border-radius:10px;border:1px solid ${diff>=0?'rgba(16,185,129,.3)':'rgba(244,63,94,.25)'}">
        <span style="font-size:13px;font-weight:600;color:${diff>=0?'var(--mint)':'#F43F5E'}">${diff>=0?'↑':'↓'} ${Math.abs(diff)}% ${diff>=0?'besser':'schlechter'} als letzten Monat</span>
      </div>`;
    }
    view=`<div class="detail-card">
      <div class="detail-name" style="margin-bottom:16px">Monatliche Bilanz</div>
      <div class="month-bar-chart">${bars}</div>
      ${trendHtml}
      <p style="font-size:11px;color:var(--t3);margin-top:10px">Grün ≥80% · Lila ≥50% · Rot &lt;50%</p>
    </div>`;
  }

  if(statView==='trend'){
    const today=todayObj();
    const points=[];
    for(let i=59;i>=0;i--){
      const d=new Date(today);d.setDate(today.getDate()-i);
      let c=0,t=0;
      for(let j=6;j>=0;j--){
        const wd=new Date(d);wd.setDate(d.getDate()-j);
        const k=toKey(wd.getFullYear(),wd.getMonth(),wd.getDate());
        if(data[k]){t++;if(data[k].length>0)c++;}
      }
      points.push(t>=3?Math.round(c/t*100):null);
    }
    const W=320,H=90,PAD=10;
    const validPoints=points.filter(p=>p!==null);
    let pathD='';
    let lastX=PAD,lastY=H-PAD;
    points.forEach((p,i)=>{
      if(p===null)return;
      const x=PAD+i*(W-PAD*2)/59;
      const y=H-PAD-(p/100)*(H-PAD*2);
      if(!pathD)pathD=`M${x.toFixed(1)} ${y.toFixed(1)}`;
      else pathD+=` L${x.toFixed(1)} ${y.toFixed(1)}`;
      lastX=x;lastY=y;
    });
    const areaD=pathD?pathD+` L${lastX.toFixed(1)} ${(H-PAD).toFixed(1)} L${PAD} ${(H-PAD).toFixed(1)} Z`:'';
    const gridLines=[25,50,75,100].map(v=>{
      const y=H-PAD-(v/100)*(H-PAD*2);
      return`<line x1="${PAD}" y1="${y.toFixed(1)}" x2="${W-PAD}" y2="${y.toFixed(1)}" stroke="var(--bd)" stroke-width="0.5"/>
      <text x="${PAD-2}" y="${(y+3).toFixed(1)}" fill="var(--t3)" font-size="7" text-anchor="end">${v}%</text>`;
    }).join('');
    const lastVal=validPoints[validPoints.length-1];
    const avgAll=validPoints.length?Math.round(validPoints.reduce((a,b)=>a+b,0)/validPoints.length):0;
    view=`<div class="detail-card">
      <div class="detail-name" style="margin-bottom:4px">7-Tage Fortschrittstrend</div>
      <p style="font-size:11px;color:var(--t3);margin-bottom:12px">Rollendes 7-Tage-Ø der letzten 60 Tage</p>
      <svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
        <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7C3AED" stop-opacity=".3"/><stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/></linearGradient></defs>
        ${gridLines}
        ${pathD?`<path d="${areaD}" fill="url(#tg)"/><path d="${pathD}" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`:''}
      </svg>
      <div style="display:flex;gap:8px;margin-top:12px">
        <div class="dstat" style="flex:1"><div class="dstat-val" style="color:var(--violet)">${lastVal??'–'}%</div><div class="dstat-lbl">Aktuell (7d)</div></div>
        <div class="dstat" style="flex:1"><div class="dstat-val">${avgAll}%</div><div class="dstat-lbl">Ø Gesamt</div></div>
        <div class="dstat" style="flex:1"><div class="dstat-val" style="color:var(--mint)">${validPoints.length?Math.max(...validPoints):0}%</div><div class="dstat-lbl">Bestes 7d-Ø</div></div>
      </div>
    </div>`;
  }

  if(statView==='meilensteine'){
    const totalCleanDays=subs.reduce((a,s)=>a+stats[s.id].cleanDays,0);
    const totalRelapses=subs.reduce((a,s)=>a+stats[s.id].relapses,0);
    const bestOverall=Math.max(...subs.map(s=>stats[s.id].bestStreak),0);
    const milestones=[
      {icon:'📅',label:'Erster Eintrag',desc:'Du hast angefangen zu tracken!',reached:totalTracked>=1,val:null},
      {icon:'🔥',label:'7-Tage Streak',desc:'Eine volle Woche eingetragen',reached:bestOverall>=7,val:bestOverall>=7?`Rekord: ${bestOverall}d`:null},
      {icon:'💪',label:'30 Einträge',desc:'Ein ganzer Monat aufgezeichnet',reached:totalTracked>=30,val:`${totalTracked} Tage gesamt`},
      {icon:'⭐',label:'Monatiger Streak',desc:'30 Tage am Stück',reached:bestOverall>=30,val:bestOverall>=30?`Rekord: ${bestOverall}d`:null},
      {icon:'💎',label:'100 Clean Days',desc:'100 clean days gesamt',reached:totalCleanDays>=100,val:`${totalCleanDays} clean days`},
      {icon:'🏆',label:'90-Tage Streak',desc:'Ein Vierteljahr am Stück!',reached:bestOverall>=90,val:bestOverall>=90?`Rekord: ${bestOverall}d`:null},
      {icon:'🌟',label:'Kein Rückfall',desc:'Noch keinen Rückfall (≥7 Tage)',reached:totalRelapses===0&&totalTracked>=7,val:totalRelapses===0?'Makellos!':null},
      {icon:'🚀',label:'365 Tage getrackt',desc:'Ein volles Jahr aufgezeichnet',reached:totalTracked>=365,val:`${totalTracked} Tage`},
    ];
    const reachedCount=milestones.filter(m=>m.reached).length;
    const cards=milestones.map(m=>`
      <div class="milestone-card${m.reached?'':' locked'}">
        <div class="milestone-icon">${m.icon}</div>
        <div class="milestone-body">
          <div class="milestone-label">${m.label}</div>
          <div class="milestone-desc">${m.reached&&m.val?m.val:m.desc}</div>
        </div>
        <div class="milestone-badge">${m.reached?'✓':'🔒'}</div>
      </div>`).join('');
    view=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span style="font-size:13px;color:var(--t2)">${reachedCount} von ${milestones.length} erreicht</span>
    </div>
    <div class="bar-track" style="margin-bottom:14px"><div class="bar-fill" style="width:${Math.round(reachedCount/milestones.length*100)}%;background:linear-gradient(90deg,var(--violet),var(--amber))"></div></div>
    ${cards}`;
  }

  return`<div class="stats-page">${tabsHtml}${view}</div>`;
}

function setStatView(v){playNav();statView=v;render();if(v==='rings')setTimeout(animateRings,50)}
function selectStatSub(id){playSelect();selectedSubStat=selectedSubStat===id?null:id;render();setTimeout(animateRings,50)}
if(statView==='heatmap')statView='rings';

function buildEdu(){
  const subs=getSubs();
  if(!subs.length)return`<div class="empty" style="margin-top:2rem"><svg class="svg-icon" style="font-size:38px;display:block;margin:0 auto 10px;opacity:.3;width:38px;height:38px" viewBox="0 0 24 24"><path d="M12 14l9-5-9-5-9 5 9 5z"/><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>Keine Substanzen vorhanden.</div>`;
  if(eduIdx>=subs.length)eduIdx=0;
  const cards=subs.map((s,i)=>{
    const ed=getEduData(s);
    const grad=s.grad||`linear-gradient(135deg,${s.color}88,${s.color})`;
    function rc(l){return l>80?'#F43F5E':l>55?'#F59E0B':l>35?'#0EA5E9':'#10B981'}
    function rb(label,val){const p=Math.round(val),col=rc(p);return`<div class="risk-row"><span class="risk-label">${label}</span><div class="risk-bar-wrap"><div class="risk-bar" style="width:${p}%;background:${col}"></div></div><span class="risk-val" style="color:${col}">${p}%</span></div>`}
    const bodyContent=ed.loading
      ?`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;gap:14px;color:var(--t2)">
          <svg class="spin-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
          <span style="font-size:13px">Lade Gesundheitsinformationen…</span>
        </div>`
      :`<div class="edu-section"><div class="edu-section-title">Risikoprofil</div>
          ${rb('Sucht',ed.riskLevel)}${rb('Körperlich',Math.min(ed.riskLevel+5,98))}${rb('Mental',Math.max(ed.riskLevel-10,5))}
        </div>
        <div class="edu-section"><div class="edu-section-title">Abhängigkeitspotenzial</div><div class="edu-section-text">${ed.addiction}</div></div>
        <div class="edu-section"><div class="edu-section-title">Kurzfristige Risiken — Körper</div><div class="edu-section-text">${ed.shortPhysical}</div></div>
        <div class="edu-section"><div class="edu-section-title">Langfristige Risiken — Körper</div><div class="edu-section-text">${ed.longPhysical}</div></div>
        <div class="edu-section"><div class="edu-section-title">Kurzfristige Risiken — Psyche</div><div class="edu-section-text">${ed.shortMental}</div></div>
        <div class="edu-section"><div class="edu-section-title">Langfristige Risiken — Psyche</div><div class="edu-section-text">${ed.longMental}</div></div>
        <div class="edu-section"><div class="edu-section-title">Genesung &amp; Chancen</div>
          <div class="edu-section-text" style="margin-bottom:8px">${ed.recovery}</div>
          <div class="recovery-badge">⏱ ${ed.timeline}</div>
        </div>
        <div class="edu-section"><div class="edu-section-title">Vollständige Genesung</div><div class="edu-section-text" style="font-weight:600;color:var(--mint)">${ed.chance}</div></div>`;
    return`<div class="edu-card">
      <div class="edu-card-header" style="background:${grad}">
        <div class="edu-badge">${s.label}</div>
        <div class="edu-card-name">${s.label}</div>
        <div class="edu-card-sub">Suchtrisiko: ${ed.loading?'…':ed.risk}</div>
      </div>
      <div class="edu-card-body">${bodyContent}</div>
    </div>`;
  }).join('');
  const dots=subs.map((_,i)=>`<span class="edu-dot${i===eduIdx?' active':''}" style="${i===eduIdx?`background:${subs[i].color}`:''}" onclick="goEduCard(${i})"></span>`).join('');
  return`<div class="edu-page">
    <div class="edu-top">
      <div class="edu-nav">${dots}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="edu-counter">${eduIdx+1} / ${subs.length}</span>
        <button class="edu-arr" id="edu-prev" onclick="goEduCard(eduIdx-1)" ${eduIdx===0?'disabled':''}>
          <svg class="svg-icon" width="16" height="16" viewBox="0 0 24 24">${SVG_CHEVRON_L}</svg>
        </button>
        <button class="edu-arr" id="edu-next" onclick="goEduCard(eduIdx+1)" ${eduIdx===subs.length-1?'disabled':''}>
          <svg class="svg-icon" width="16" height="16" viewBox="0 0 24 24">${SVG_CHEVRON_R}</svg>
        </button>
      </div>
    </div>
    <div class="edu-viewport" id="edu-viewport">
      <div class="edu-track" id="edu-track" style="transform:translateX(-${eduIdx*100}%)">
        ${cards}
      </div>
    </div>
    <div class="edu-swipe-hint">← Wischen zum Blättern →</div>
  </div>`;}

function initEduSwipe(){
  const vp=document.getElementById('edu-viewport');
  if(!vp)return;
  let startX=null,startY=null,dragging=false;
  vp.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=false;},{passive:true});
  vp.addEventListener('touchmove',e=>{
    if(startX===null)return;
    if(Math.abs(e.touches[0].clientX-startX)>Math.abs(e.touches[0].clientY-startY)&&Math.abs(e.touches[0].clientX-startX)>8)dragging=true;
  },{passive:true});
  vp.addEventListener('touchend',e=>{
    if(startX===null||!dragging){startX=null;startY=null;dragging=false;return;}
    const dx=e.changedTouches[0].clientX-startX;
    startX=null;startY=null;dragging=false;
    if(dx<-40)goEduCard(eduIdx+1);
    else if(dx>40)goEduCard(eduIdx-1);
  },{passive:true});
  let mX=null;
  vp.addEventListener('mousedown',e=>{mX=e.clientX;});
  vp.addEventListener('mouseup',e=>{
    if(mX===null)return;
    const dx=e.clientX-mX;mX=null;
    if(dx<-40)goEduCard(eduIdx+1);
    else if(dx>40)goEduCard(eduIdx-1);
  });
}

function renderEduPos(){
  const track=document.getElementById('edu-track');
  if(track)track.style.transform=`translateX(-${eduIdx*100}%)`;
  const subs=getSubs();
  document.querySelectorAll('.edu-dot').forEach((d,i)=>{
    d.className='edu-dot'+(i===eduIdx?' active':'');
    d.style.background=i===eduIdx?subs[i].color:'';
  });
  const ctr=document.querySelector('.edu-counter');
  if(ctr)ctr.textContent=`${eduIdx+1} / ${subs.length}`;
  const prev=document.getElementById('edu-prev');
  const next=document.getElementById('edu-next');
  if(prev)prev.disabled=eduIdx===0;
  if(next)next.disabled=eduIdx===subs.length-1;
}
function goEduCard(i){
  const subs=getSubs();
  if(i<0||i>=subs.length)return;
  playNav();eduIdx=i;renderEduPos();
}

// MODAL — entry sheet + manage sheet
// ════════════════════════════════════════
function renderModal(){
  const c=document.getElementById('modal-container');
  if(!modalDate){c.innerHTML='';return;}
  const subs=getSubs();
  const p=modalDate.split('-');
  const dateLabel=`${parseInt(p[2])}. ${MONTHS[parseInt(p[1])-1]} ${p[0]}`;
  const allSelected=subs.every(s=>modalSel.includes(s.id));
  const subsHtml=subs.map(s=>{
    const active=modalSel.includes(s.id);
    const iconColor=active?s.color:'var(--t2)';
    return`<button class="sub-btn${active?' active':''}" data-sid="${s.id}"
      style="${active?`background:${s.color}18;border-color:${s.color}66`:''}"
      onclick="toggleSub('${s.id}')">
      <span class="sub-dot" style="${active?`background:${s.color};border-color:${s.color};box-shadow:0 0 7px ${s.color}66`:''}"></span>
      ${getSubIcon(s,15,iconColor)}
      <span>${s.label}</span>
    </button>`;
  }).join('');
  c.innerHTML=`<div class="sheet-overlay" onclick="handleOverlay(event)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="sheet-title">${dateLabel}</div>
      <div class="sheet-sub">Wovon warst du heute enthaltsam?</div>
      <button class="btn-clean-all${allSelected?' all-selected':''}" id="btn-clean-all" onclick="toggleAll()">
        ${allSelected
          ? `<svg class="svg-icon" width="17" height="17" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Alles abwählen`
          : `<svg class="svg-icon" width="17" height="17" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Clean from Everything`}
      </button>
      <div class="subs-grid" id="subs-grid">${subsHtml}</div>
      <div style="margin-bottom:10px;text-align:center">
        <button style="background:none;border:none;color:var(--t3);font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline" onclick="closeModal();switchTab('gewohnheiten')">
          Gewohnheiten verwalten →
        </button>
      </div>
      <div class="sheet-actions">
        <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
        <button class="btn-save" onclick="saveEntry()">Speichern ✓</button>
      </div>
    </div>
  </div>`;
}

// Update a single sub-button in place without rebuilding the sheet
function updateSubBtn(id){
  const subs=getSubs();
  const s=subs.find(x=>x.id===id);
  if(!s)return;
  const btn=document.querySelector(`[data-sid="${id}"]`);
  if(!btn)return;
  const active=modalSel.includes(id);
  btn.className=`sub-btn${active?' active':''}`;
  btn.style.cssText=active?`background:${s.color}18;border-color:${s.color}66`:'';
  const dot=btn.querySelector('.sub-dot');
  if(dot)dot.style.cssText=active?`background:${s.color};border-color:${s.color};box-shadow:0 0 7px ${s.color}66`:'';
  // Update icon color — works for both <i> and <span> icon wrappers
  const iconColor=active?s.color:'var(--t2)';
  const ti=btn.querySelector('.ti');
  if(ti)ti.style.color=iconColor;
  const svgIcon=btn.querySelector('.sub-svg-icon');
  if(svgIcon)svgIcon.style.color=iconColor;
  // update clean-all button state
  const allBtn=document.getElementById('btn-clean-all');
  if(allBtn){
    const allSel=subs.every(x=>modalSel.includes(x.id));
    allBtn.className=`btn-clean-all${allSel?' all-selected':''}`;
    allBtn.innerHTML=allSel
      ?`<svg class="svg-icon" width="17" height="17" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Alles abwählen`
      :`<svg class="svg-icon" width="17" height="17" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Clean from Everything`;
  }
}


function openManage(){switchTab('gewohnheiten');closeModal();}



async function fetchEduData(id, label){
  try{
    const prompt=`Du bist ein medizinischer Informationsdienst. Erstelle prägnante Gesundheitsinformationen über folgende Gewohnheit/Substanz: "${label}".

Antworte NUR mit einem JSON-Objekt (kein Markdown, keine Erklärungen) in exakt diesem Format:
{
  "risk": "Niedrig|Mittel|Hoch|Sehr hoch",
  "riskLevel": 0-100,
  "addiction": "Kurze Beschreibung des Suchtpotenzials",
  "shortPhysical": "Kurzfristige körperliche Risiken",
  "longPhysical": "Langfristige körperliche Risiken",
  "shortMental": "Kurzfristige psychische Risiken",
  "longMental": "Langfristige psychische Risiken",
  "recovery": "Wie realistisch ist vollständige Genesung?",
  "timeline": "Zeitliche Abfolge der Genesung",
  "chance": "Genesungschancen als kurzer Satz"
}

Wenn es sich um eine harmlose Gewohnheit (z.B. Schokolade, Kaffee, Nagelkauen) handelt, passe die Werte entsprechend an. Antworte auf Deutsch.`;

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!res.ok)throw new Error('API error '+res.status);
    const json=await res.json();
    const text=json.content[0].text.replace(/```json|```/g,'').trim();
    const edu=JSON.parse(text);
    customEduData[id]=edu;
    saveCustomEdu();
    // Re-render education tab if currently open
    if(currentTab==='education')render();
    showToast(`Infos für „${label}" geladen ✓`);
  }catch(e){
    // Store a meaningful fallback so it's not blank
    customEduData[id]={
      risk:'Unbekannt',riskLevel:40,
      addiction:`Zu „${label}" liegen keine spezifischen Abhängigkeitsdaten vor.`,
      shortPhysical:`Kurzfristige Risiken von „${label}" sind nicht klassifiziert.`,
      longPhysical:`Langfristige körperliche Risiken von „${label}" sind nicht bekannt.`,
      shortMental:`Kurzfristige psychische Auswirkungen von „${label}" variieren individuell.`,
      longMental:`Langzeiteffekte von „${label}" auf die Psyche sind nicht dokumentiert.`,
      recovery:`Ohne bekannte Sucht ist Verhaltensänderung bei „${label}" gut möglich.`,
      timeline:'Individuell verschieden — konsultiere bei Bedarf einen Arzt.',
      chance:'Gut, je nach individuellem Hintergrund.',
    };
    saveCustomEdu();
    if(currentTab==='education')render();
  }
}

function handleOverlay(e){if(e.target.classList.contains('sheet-overlay'))closeModal();}
function openModal(k){playPop();modalDate=k;modalSel=[...(data[k]||[])];manageOpen=false;renderModal();}
function closeModal(){modalDate=null;modalSel=[];manageOpen=false;renderModal();}
function toggleSub(id){
  const i=modalSel.indexOf(id);
  if(i>=0){modalSel.splice(i,1);playDeselect();}
  else{modalSel.push(id);playSelect();}
  updateSubBtn(id);
}
function toggleAll(){
  const subs=getSubs();
  const allSelected=subs.every(s=>modalSel.includes(s.id));
  if(allSelected){
    modalSel=[];
    playDeselect();
  } else {
    modalSel=subs.map(s=>s.id);
    playChime();
  }
  // Rebuild just the subs grid and clean-all button (no sheet flash)
  const grid=document.getElementById('subs-grid');
  if(grid){
    grid.innerHTML=subs.map(s=>{
      const active=modalSel.includes(s.id);
      return`<button class="sub-btn${active?' active':''}" data-sid="${s.id}"
        style="${active?`background:${s.color}18;border-color:${s.color}66`:''}"
        onclick="toggleSub('${s.id}')">
        <span class="sub-dot" style="${active?`background:${s.color};border-color:${s.color};box-shadow:0 0 7px ${s.color}66`:''}"></span>
        <i class="ti ${s.icon} sub-icon" style="color:${active?s.color:'var(--t2)'}"></i>
        <span>${s.label}</span>
      </button>`;
    }).join('');
  }
  const allBtn=document.getElementById('btn-clean-all');
  if(allBtn){
    const nowAll=subs.every(s=>modalSel.includes(s.id));
    allBtn.className=`btn-clean-all${nowAll?' all-selected':''}`;
    allBtn.innerHTML=nowAll
      ?`<svg class="svg-icon" width="17" height="17" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Alles abwählen`
      :`<svg class="svg-icon" width="17" height="17" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Clean from Everything`;
  }
}

function saveEntry(){
  if(modalDate){data[modalDate]=[...modalSel];saveData();}
  const count=modalSel.length;
  const subs=getSubs();
  if(count===subs.length){mascotMood='cheer';playFanfare();setTimeout(()=>setMascotMood('cheer','saved_great'),400);showToast('Perfekter Tag! 🌟');}
  else if(count>0){mascotMood='proud';playSave();setTimeout(()=>setMascotMood('proud','saved_some'),300);showToast(`${count} eingetragen ✓`);}
  else{mascotMood='happy';playSave();setTimeout(()=>setMascotMood('happy','saved_none'),300);showToast('Eingetragen 📝');}
  modalDate=null;modalSel=[];renderModal();render();
}

function navigate(dir){playNav();viewM+=dir;if(viewM<0){viewM=11;viewY--}if(viewM>11){viewM=0;viewY++}render();}
function switchTab(tab){playNav();currentTab=tab;render();if(tab==='statistik')setTimeout(animateRings,100);}
function dismissBanner(){bannerDismissed=true;try{localStorage.setItem('clean_banner','1')}catch(e){}render();}

function toggleNotif(){
  if(!notifEnabled){
    if('Notification' in window&&Notification.permission!=='granted'){
      Notification.requestPermission().then(p=>{if(p==='granted'){notifEnabled=true;localStorage.setItem('clean_notif','1');scheduleNotif();render();showToast('Erinnerung aktiv ✓');}else{showToast('Benachrichtigungen blockiert');}});
    } else {notifEnabled=true;localStorage.setItem('clean_notif','1');scheduleNotif();render();showToast('Erinnerung aktiv ✓');}
  } else {notifEnabled=false;localStorage.setItem('clean_notif','0');if(notifTimer)clearTimeout(notifTimer);render();showToast('Erinnerung deaktiviert');}
}
function scheduleNotif(){
  if(!notifEnabled)return;
  const now=new Date(),next=new Date();
  next.setHours(22,0,0,0);if(next<=now)next.setDate(next.getDate()+1);
  notifTimer=setTimeout(()=>{
    if(notifEnabled&&'Notification' in window&&Notification.permission==='granted')
      new Notification('Bad Habit Tracker',{body:'Dein Frosch vermisst dich! 🐸 Wie war dein Tag?'});
    scheduleNotif();
  },next-now);
}

loadData();
applyTheme();
initSplash();

if(notifEnabled)scheduleNotif();
