<style>
/* ══════════════════════════════════
   TOKENS
══════════════════════════════════ */
:root{
  --bg:#0A0E1A;--bg2:#131929;--bg3:#1E2640;--bg4:#252d47;
  --t1:#F0F4FF;--t2:#8892B0;--t3:#4A5578;
  --bd:#2A3354;--bd2:#3a4570;
  --violet:#7C3AED;--violet-l:#A78BFA;--violet-d:#6D28D9;
  --coral:#F43F5E;--amber:#F59E0B;--mint:#10B981;--sky:#0EA5E9;--pink:#EC4899;
  --hero-grad:linear-gradient(135deg,#1a0a3d 0%,#0d1f3c 100%);
  --hero-glow:rgba(124,58,237,.25);
  --card-bg:var(--bg2);--card-bd:var(--bd);
  --input-bg:var(--bg3);--tabbar-bg:rgba(10,14,26,.92);
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme="light"]{
  --bg:#FAFAF8;--bg2:#FFFFFF;--bg3:#F3F1FF;--bg4:#EDE9FE;
  --t1:#1A1A2E;--t2:#5B5B7A;--t3:#9B99BB;
  --bd:#E2DDFF;--bd2:#C7C0F5;
  --violet:#7C3AED;--violet-l:#7C3AED;--violet-d:#6D28D9;
  --coral:#F43F5E;--amber:#D97706;--mint:#059669;--sky:#0284C7;--pink:#DB2777;
  --hero-grad:linear-gradient(135deg,#EDE9FE 0%,#FCE7F3 100%);
  --hero-glow:rgba(124,58,237,.12);
  --card-bg:#FFFFFF;--card-bd:#E2DDFF;
  --input-bg:#F5F3FF;--tabbar-bg:rgba(250,250,248,.94);
}
/* ══════════════════════════════════
   BASE
══════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  padding:2rem;
  transition:opacity .7s ease,transform .7s ease;
}
#splash.hiding{opacity:0;transform:scale(1.04);pointer-events:none}
.splash-iso{animation:splashBob 2s ease-in-out infinite}
@keyframes splashBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.splash-msg{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--t1);text-align:center;max-width:280px;line-height:1.4;animation:fadeInUp .6s .2s both ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.splash-sub{font-size:14px;color:var(--t2);animation:fadeInUp .6s .5s both ease}
.splash-skip{margin-top:8px;background:none;border:1px solid var(--bd);border-radius:99px;padding:8px 20px;color:var(--t2);font-size:13px;cursor:pointer;font-family:inherit;animation:fadeInUp .6s .8s both ease}
.splash-logo{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;background:linear-gradient(90deg,var(--violet),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fadeInUp .5s both ease}
.splash-progress{width:120px;height:3px;background:var(--bg3);border-radius:99px;overflow:hidden;animation:fadeInUp .6s .9s both ease}
.splash-bar{height:3px;background:linear-gradient(90deg,var(--violet),var(--coral));border-radius:99px;animation:splashLoad 5s linear forwards}
@keyframes splashLoad{from{width:0}to{width:100%}}
/* ── SHELL ── */
#shell{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:var(--safe-top)}
#header{padding:10px 14px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--bd)}
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(72px + var(--safe-bottom))}
.app-logo{display:flex;align-items:center;gap:9px}
.logo-gem{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--violet),var(--coral));display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;box-shadow:0 0 14px rgba(124,58,237,.35)}
.app-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;background:linear-gradient(90deg,var(--violet),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-actions{display:flex;gap:6px;align-items:center}
.icon-btn{
  width:34px;height:34px;border-radius:10px;border:1px solid var(--bd);
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t2);font-size:17px;transition:all .2s;
}
.icon-btn:active{transform:scale(.88);background:var(--bg4)}
.icon-btn.notif-on{color:var(--amber);border-color:var(--amber);background:rgba(245,158,11,.1)}
/* ── TABBAR ── */
#tabbar{position:fixed;bottom:0;left:0;right:0;padding-bottom:var(--safe-bottom);background:var(--tabbar-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;z-index:50}
.tab{flex:1;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-family:'Inter',inherit;color:var(--t3);font-size:9px;font-weight:600;letter-spacing:.03em;transition:color .2s}
.tab i{font-size:21px;transition:transform .2s}
.tab.active{color:var(--violet)}
.tab.active i{transform:scale(1.18)}
/* ── MASCOT ── */
.mascot-wrap{
  padding:12px 16px 0;
  display:flex;
  align-items:center;
  gap:12px;
}
.mascot-bubble{
  flex:1;
  background:var(--card-bg);
  border:1.5px solid var(--bd);
  border-radius:16px 16px 16px 4px;
  padding:11px 13px;
  font-size:13px;color:var(--t1);line-height:1.55;
  position:relative;transition:all .3s;
}
.mascot-bubble strong{color:var(--violet)}
/* Tail points left toward Iso — bottom-left of bubble */
.mascot-bubble::after{
  content:'';position:absolute;
  bottom:16px;left:-8px;
  width:8px;height:14px;
  background:var(--card-bg);
  clip-path:polygon(100% 0,100% 100%,0 50%);
}
/* Border part of tail */
.mascot-bubble::before{
  content:'';position:absolute;
  bottom:15px;left:-10px;
  width:10px;height:16px;
  background:var(--bd);
  clip-path:polygon(100% 0,100% 100%,0 50%);
  z-index:-1;
}
.mascot-svg-wrap{flex-shrink:0;cursor:pointer;transition:transform .2s}
.mascot-svg-wrap:active{transform:scale(.88)}
/* ── HERO ── */
.hero{margin:10px 16px 0;padding:16px 18px;border-radius:18px;background:var(--hero-grad);border:1px solid var(--bd);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,var(--hero-glow) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--violet-l);font-weight:600;margin-bottom:4px}
.hero-num{font-family:'Syne',sans-serif;font-size:64px;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--t1) 30%,var(--violet-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-label{font-size:13px;color:var(--t2);margin-top:2px}
.hero-chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.hero-chip{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600}
/* ── SECTION TITLE ── */
.sec-title{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);font-weight:600;margin:16px 16px 8px}
/* ── NOTIF / INSTALL ── */
.install-banner{margin:8px 16px 0;background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.22);border-radius:12px;padding:10px 12px;display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--violet)}
.install-banner span{flex:1;line-height:1.5}.install-banner button{background:none;border:none;color:var(--t2);cursor:pointer;font-size:18px;padding:0;flex-shrink:0}
/* ── CALENDAR ── */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:10px}
.cal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--t1)}
.cal-nav{
  width:36px;height:36px;border-radius:10px;
  background:var(--bg3);border:1px solid var(--bd);
  cursor:pointer;color:var(--t2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all .15s;
}
.cal-nav:active{transform:scale(.88);background:var(--bg4)}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 16px;margin-bottom:4px}
.dow{text-align:center;font-size:10px;color:var(--t3);padding:2px 0;font-weight:600}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 16px}
.day-cell{border-radius:9px;border:1px solid var(--bd);min-height:54px;padding:5px 4px;cursor:pointer;background:var(--card-bg);transition:transform .1s;position:relative;overflow:hidden}
.day-cell:active{transform:scale(.9)}
.day-cell.empty{border-color:transparent;background:transparent;cursor:default}
.day-cell.today{border:1.5px solid var(--violet)}
[data-theme="dark"] .day-cell.today{background:rgba(124,58,237,.08)}
[data-theme="light"] .day-cell.today{background:rgba(124,58,237,.05)}
.day-cell.future{opacity:.22;pointer-events:none}
.day-cell.has-entry{background:var(--bg3)}
.day-num{font-size:10px;font-weight:600;color:var(--t3);margin-bottom:3px;line-height:1}
.day-cell.today .day-num{color:var(--violet)}
.day-cell.has-entry .day-num{color:var(--t1)}
.gem-row{display:flex;flex-wrap:wrap;gap:2px}
.gem{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.gem-all{width:100%;text-align:center;font-size:7px;font-weight:700;color:var(--mint)}
/* ── BOTTOM SHEET ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg2);width:100%;border-radius:22px 22px 0 0;border-top:1px solid var(--bd);padding:10px 18px calc(20px + var(--safe-bottom));animation:slideUp .25s cubic-bezier(.32,.72,0,1);max-height:91vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;border-radius:99px;background:var(--bg4);margin:0 auto 14px}
.sheet-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;color:var(--t1);margin-bottom:3px}
.sheet-sub{font-size:13px;color:var(--t2);margin-bottom:14px;line-height:1.5}
.subs-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.sub-btn{padding:10px;border-radius:12px;border:1.5px solid var(--bd);background:var(--bg3);font-size:12px;color:var(--t1);cursor:pointer;text-align:left;display:flex;align-items:center;gap:7px;font-family:inherit;transition:all .15s;-webkit-user-select:none;user-select:none;width:100%}
.sub-btn:active{transform:scale(.94)}
.sub-btn i.sub-icon{font-size:14px;flex-shrink:0}
.sub-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--bd);flex-shrink:0;transition:all .15s}
.sub-del{position:absolute;top:4px;right:5px;background:none;border:none;color:var(--t3);font-size:13px;cursor:pointer;padding:2px;line-height:1;transition:color .15s}
.sub-del:hover{color:var(--coral)}
.btn-manage{width:100%;margin-top:8px;padding:9px;background:none;border:1px solid var(--bd);border-radius:9px;font-size:12px;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.btn-manage:active{background:var(--bg3)}
.manage-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd)}
.manage-row:last-child{border-bottom:none}
.manage-del-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);border-radius:8px;color:#F43F5E;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .15s}
.manage-del-btn:active{transform:scale(.94);background:rgba(244,63,94,.2)}
.add-custom-row{margin-bottom:14px;padding-top:10px;border-top:1px solid var(--bd)}
.add-custom-label{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.custom-input-wrap{display:flex;gap:7px}
.custom-input{flex:1;background:var(--input-bg);border:1.5px solid var(--bd);border-radius:9px;padding:9px 12px;color:var(--t1);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.custom-input:focus{border-color:var(--violet)}
.custom-input::placeholder{color:var(--t3)}
.btn-add{padding:9px 13px;background:var(--violet);color:#fff;border:none;border-radius:9px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap;transition:all .15s}
.btn-add:active{transform:scale(.94)}
.sheet-actions{display:flex;gap:8px}
.btn-save{flex:1;padding:13px;background:linear-gradient(135deg,var(--violet),var(--coral));color:#fff;border:none;border-radius:12px;font-size:15px;cursor:pointer;font-weight:700;font-family:'Syne',sans-serif;box-shadow:0 4px 18px rgba(124,58,237,.28);transition:transform .15s}
.btn-save:active{transform:scale(.96)}
.btn-cancel{padding:13px 16px;background:var(--bg3);border:1px solid var(--bd);border-radius:12px;font-size:14px;color:var(--t2);cursor:pointer;font-family:inherit}
.btn-cancel:active{transform:scale(.96)}
/* ── STATS ── */
.stats-page{padding:0 16px 16px}
.stat-tabs{display:flex;gap:6px;margin-bottom:14px}
.stat-tab{padding:6px 13px;border-radius:99px;font-size:12px;font-weight:600;border:1.5px solid var(--bd);background:var(--bg2);color:var(--t2);cursor:pointer;font-family:inherit;transition:all .15s}
.stat-tab.active{background:var(--violet);border-color:var(--violet);color:#fff}
.stat-tab:active{transform:scale(.94)}
.rings-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.ring-card{background:var(--card-bg);border:1px solid var(--card-bd);border-radius:14px;padding:13px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all .2s}
.ring-card:active{transform:scale(.95)}
.ring-card.selected{border-width:2px}
.ring-wrap{position:relative;width:78px;height:78px}
.ring-svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg3);stroke-width:7}
.ring-fill{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Syne',sans-serif;font-size:15px;font-weight:800}
.ring-name{font-size:11px;font-weight:600;color:var(--t1);text-align:center}
.ring-meta{font-size:10px;color:var(--t2);text-align:center}
.detail-card{background:var(--card-bg);border:1px solid var(--card-bd);border-radius:14px;padding:14px;margin-bottom:8px}
.detail-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--t1);margin-bottom:12px;display:flex;align-items:center;gap:9px}
.detail-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.dstat{background:var(--bg3);border-radius:10px;padding:9px;text-align:center}
.dstat-val{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--t1)}
.dstat-lbl{font-size:10px;color:var(--t2);margin-top:2px;font-weight:500}
.bar-track{height:7px;background:var(--bg3);border-radius:99px;overflow:hidden}
.bar-fill{height:7px;border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.bar-meta{display:flex;justify-content:space-between;margin-top:4px}
.bar-meta span{font-size:11px;color:var(--t2)}
.heatmap-wrap{margin-bottom:13px}
.heatmap-title{font-size:12px;color:var(--t2);font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hm-cell{aspect-ratio:1;border-radius:4px;background:var(--bg3)}
.hm-cell.hm-miss{background:rgba(244,63,94,.2)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--t2);font-size:14px}
.empty i{font-size:38px;display:block;margin:0 auto 10px;opacity:.3}
/* ══ EDUCATION CARDS ══ */
.edu-page{padding:0 0 16px}
.edu-top{padding:4px 16px 0;display:flex;align-items:center;justify-content:space-between}
.edu-nav{display:flex;align-items:center;gap:10px}
.edu-dot{width:7px;height:7px;border-radius:50%;background:var(--bg3);transition:all .25s;cursor:pointer;flex-shrink:0}
.edu-dot.active{width:20px;border-radius:99px}
.edu-arr{width:32px;height:32px;border-radius:9px;border:1px solid var(--bd);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);transition:all .15s;flex-shrink:0}
.edu-arr:active{transform:scale(.88);background:var(--bg4)}
.edu-arr:disabled{opacity:.3;pointer-events:none}
.edu-counter{font-size:12px;color:var(--t2);font-weight:500;min-width:40px;text-align:center}
.edu-viewport{overflow:hidden;margin:10px 16px 0;border-radius:20px}
.edu-track{display:flex;transition:transform .38s cubic-bezier(.32,.72,0,1);will-change:transform}
.edu-card{flex-shrink:0;width:100%;border-radius:20px;overflow:hidden;box-shadow:0 6px 30px rgba(0,0,0,.25)}
.edu-card-header{padding:22px 20px 18px}
.edu-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:11px;font-weight:700;background:rgba(255,255,255,.18);color:#fff;margin-bottom:10px}
.edu-card-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;line-height:1.1}
.edu-card-sub{font-size:13px;color:rgba(255,255,255,.72);margin-top:5px}
.edu-card-body{background:var(--card-bg);padding:16px 18px 20px}
.edu-section{margin-bottom:14px}
.edu-section:last-child{margin-bottom:0}
.edu-section-title{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);font-weight:700;margin-bottom:7px}
.edu-section-text{font-size:13px;color:var(--t2);line-height:1.6}
.risk-row{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.risk-label{font-size:12px;color:var(--t2);width:76px;flex-shrink:0}
.risk-bar-wrap{flex:1;height:6px;background:var(--bg3);border-radius:99px;overflow:hidden}
.risk-bar{height:6px;border-radius:99px}
.risk-val{font-size:11px;font-weight:600;width:28px;text-align:right}

function isoSVG(mood='happy',size=70){
  const dark=isDark;
  const bc=dark?'#A78BFA':'#7C3AED';
  const sc=dark?'#7C3AED':'#6D28D9';
  const lc=dark?'#8B5CF6':'#6D28D9';
  const blush=mood==='proud'||mood==='cheer'?'rgba(244,63,94,.4)':'rgba(244,63,94,.18)';
  const mouth=mood==='cheer'?
    `<path d="M32 21 Q37 25 42 21" stroke="#1A1A2E" stroke-width="1.8" stroke-linecap="round" fill="none"/>`:
    mood==='happy'||mood==='proud'?
    `<path d="M33 21 Q37 24.5 41 21" stroke="#1A1A2E" stroke-width="1.6" stroke-linecap="round" fill="none"/>`:
    `<path d="M33 22.5 Q37 20 41 22.5" stroke="#1A1A2E" stroke-width="1.6" stroke-linecap="round" fill="none"/>`;
  const bob=mood==='cheer'?
    `<animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="0.45s" repeatCount="indefinite"/>`:
    `<animateTransform attributeName="transform" type="translate" values="0,0;0,-1.5;0,0" dur="2.2s" repeatCount="indefinite"/>`;
  const legs=Array.from({length:4},(_,i)=>{
    const y=32+i*9;
    const d=mood==='cheer'?14:6;
    return`<line x1="15" y1="${y}" x2="5" y2="${y+4}" stroke="${lc}" stroke-width="2" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" values="0 15 ${y};${d} 15 ${y};0 15 ${y}" dur="${.38+i*.07}s" repeatCount="indefinite"/></line>
    <line x1="59" y1="${y}" x2="69" y2="${y+4}" stroke="${lc}" stroke-width="2" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" values="0 59 ${y};${-d} 59 ${y};0 59 ${y}" dur="${.38+i*.07}s" repeatCount="indefinite"/></line>`;
  }).join('');
  return`<svg width="${size}" height="${size}" viewBox="0 0 74 82" xmlns="http://www.w3.org/2000/svg">
  <g>${bob}
    <line x1="30" y1="14" x2="20" y2="4" stroke="${lc}" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="14" x2="54" y2="4" stroke="${lc}" stroke-width="2" stroke-linecap="round"/>
    <circle cx="20" cy="3" r="2.2" fill="${lc}"/>
    <circle cx="54" cy="3" r="2.2" fill="${lc}"/>
    <ellipse cx="37" cy="22" rx="15" ry="9" fill="${bc}"/>
    <ellipse cx="37" cy="30" rx="18" ry="9" fill="${sc}"/>
    <ellipse cx="37" cy="38" rx="19" ry="9" fill="${bc}"/>
    <ellipse cx="37" cy="46" rx="18" ry="9" fill="${sc}"/>
    <ellipse cx="37" cy="54" rx="16" ry="8" fill="${bc}"/>
    <ellipse cx="37" cy="62" rx="12" ry="7" fill="${sc}"/>

function playTone(f,t='sine',d=.12,v=.13){
  try{const c=getAudio();const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.setValueAtTime(f,c.currentTime);g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d)}catch(e){}
}

function todayKey(){const n=new Date();return toKey(n.getFullYear(),n.getMonth(),n.getDate())}

function calcStreak(){
  const now=todayObj();let s=0;
  for(let i=0;i<730;i++){const d=new Date(now);d.setDate(now.getDate()-i);const k=toKey(d.getFullYear(),d.getMonth(),d.getDate());if(data[k]&&data[k].length>0)s++;else if(i>0)break;}

}

function computeStats(){
  const subs=getSubs();
  const sortedKeys=Object.keys(data).sort();
  if(!sortedKeys.length)return null;
  const today=todayObj();
  const stats={};
  subs.forEach(s=>{stats[s.id]={cleanDays:0,relapses:0,currentStreak:0,bestStreak:0,totalTracked:0}});
  subs.forEach(s=>{
    const entryDates=sortedKeys.map(k=>({k,isClean:data[k].includes(s.id)}));
    let streak=0,best=0,relapses=0,total=0,prevWasClean=null;
    entryDates.forEach(({isClean})=>{
      if(isClean){total++;streak++;if(streak>best)best=streak;prevWasClean=true;}
      else{if(prevWasClean===true)relapses++;streak=0;prevWasClean=false;}
    });
    let cur=0;
    for(let i=entryDates.length-1;i>=0;i--){if(entryDates[i].isClean)cur++;else break;}
    stats[s.id]={cleanDays:total,relapses,currentStreak:cur,bestStreak:best,totalTracked:entryDates.length};
  });
  return stats;
}

      </div>`;

    view=`<div class="rings-grid">${ringsHtml}</div>${detailHtml}`;
  }

    const totalRelapses=subs.reduce((a,s)=>a+stats[s.id].relapses,0);
    const rows=subs.map(s=>{

        <div class="edu-section"><div class="edu-section-title">Vollständige Genesung</div><div class="edu-section-text" style="font-weight:600;color:var(--mint)">${ed.chance}</div></div>
      </div>
    </div>`;
  }).join('');
  const dots=subs.map((_,i)=>`<span class="edu-dot${i===eduIdx?' active':''}" style="${i===eduIdx?`background:${subs[i].color}`:''}" onclick="goEduCard(${i})"></span>`).join('');
  return`<div class="edu-page">
    <div class="edu-top">
      <div class="edu-nav">${dots}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="edu-counter">${eduIdx+1} / ${subs.length}</span>
        <button class="edu-arr" id="edu-prev" onclick="goEduCard(${eduIdx-1})" ${eduIdx===0?'disabled':''}>
          <svg class="svg-icon" width="16" height="16" viewBox="0 0 24 24">${SVG_CHEVRON_L}</svg>
        </button>
        <button class="edu-arr" id="edu-next" onclick="goEduCard(${eduIdx+1})" ${eduIdx===subs.length-1?'disabled':''}>
          <svg class="svg-icon" width="16" height="16" viewBox="0 0 24 24">${SVG_CHEVRON_R}</svg>
        </button>
      </div>
    </div>
    <div class="edu-viewport" id="edu-viewport">
      <div class="edu-track" id="edu-track" style="transform:translateX(-${eduIdx*100}%)">
        ${cards}
      </div>
    </div>
    <div class="edu-swipe-hint">← Wischen zum Blättern →</div>
  </div>`;}

function initEduSwipe(){
  const vp=document.getElementById('edu-viewport');
  if(!vp)return;
  let startX=null,startY=null,dragging=false;
  vp.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=false;},{passive:true});
  vp.addEventListener('touchmove',e=>{
    if(startX===null)return;
    if(Math.abs(e.touches[0].clientX-startX)>Math.abs(e.touches[0].clientY-startY)&&Math.abs(e.touches[0].clientX-startX)>8)dragging=true;
  },{passive:true});
  vp.addEventListener('touchend',e=>{
    if(startX===null||!dragging){startX=null;startY=null;dragging=false;return;}
    const dx=e.changedTouches[0].clientX-startX;
    startX=null;startY=null;dragging=false;
    if(dx<-40)goEduCard(eduIdx+1);
    else if(dx>40)goEduCard(eduIdx-1);
  },{passive:true});
  let mX=null;
  vp.addEventListener('mousedown',e=>{mX=e.clientX;});
  vp.addEventListener('mouseup',e=>{
    if(mX===null)return;
    const dx=e.clientX-mX;mX=null;
    if(dx<-40)goEduCard(eduIdx+1);
    else if(dx>40)goEduCard(eduIdx-1);
  });
}

function renderEduPos(){
  const track=document.getElementById('edu-track');
  if(track)track.style.transform=`translateX(-${eduIdx*100}%)`;
  const subs=getSubs();
  document.querySelectorAll('.edu-dot').forEach((d,i)=>{
    d.className='edu-dot'+(i===eduIdx?' active':'');
    d.style.background=i===eduIdx?subs[i].color:'';
  });
  const ctr=document.querySelector('.edu-counter');
  if(ctr)ctr.textContent=`${eduIdx+1} / ${subs.length}`;
  const prev=document.getElementById('edu-prev');
  const next=document.getElementById('edu-next');
  if(prev)prev.disabled=eduIdx===0;
  if(next)next.disabled=eduIdx===subs.length-1;
}
function goEduCard(i){
  const subs=getSubs();
  if(i<0||i>=subs.length)return;
  playNav();eduIdx=i;renderEduPos();
}

// ════════════════════════════════════════
// MODAL — entry sheet + manage sheet
// ════════════════════════════════════════
let manageOpen=false;

function renderModal(){
  const c=document.getElementById('modal-container');
  if(!modalDate){c.innerHTML='';return;}
  if(manageOpen){renderManageSheet();return;}
  const subs=getSubs();
  const p=modalDate.split('-');
  const dateLabel=`${parseInt(p[2])}. ${MONTHS[parseInt(p[1])-1]} ${p[0]}`;
  // Each substance is its own standalone button — NO nesting
  const subsHtml=subs.map(s=>{
    const active=modalSel.includes(s.id);
    return`<button class="sub-btn${active?' active':''}"
      style="${active?`background:${s.color}18;border-color:${s.color}66`:''}"
      onclick="toggleSub('${s.id}')">
      <span class="sub-dot" style="${active?`background:${s.color};border-color:${s.color};box-shadow:0 0 7px ${s.color}66`:''}"></span>
      <i class="ti ${s.icon} sub-icon" style="color:${active?s.color:'var(--t2)'}"></i>
      <span>${s.label}</span>
    </button>`;
  }).join('');
  c.innerHTML=`<div class="sheet-overlay" onclick="handleOverlay(event)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="sheet-title">${dateLabel}</div>
      <div class="sheet-sub">Wovon warst du heute enthaltsam?</div>
      <div class="subs-grid">${subsHtml}</div>
      <div class="add-custom-row">
        <div class="add-custom-label">Eigene Substanz hinzufügen</div>
        <div class="custom-input-wrap">
          <input class="custom-input" id="custom-input" placeholder="z.B. Schokolade…" maxlength="24">
          <button class="btn-add" onclick="addCustomSub()">+</button>
        </div>
        ${customSubs.length>0?`<button class="btn-manage" onclick="openManage()">Substanzen verwalten / entfernen</button>`:''}
      </div>
      <div class="sheet-actions">
        <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
        <button class="btn-save" onclick="saveEntry()">Speichern ✓</button>
      </div>
    </div>
  </div>`;}

function renderManageSheet(){
  const c=document.getElementById('modal-container');
  const rows=customSubs.map(s=>`
    <div class="manage-row">
      <i class="ti ${s.icon}" style="color:${s.color};font-size:16px;flex-shrink:0"></i>
      <span style="flex:1;font-size:14px;color:var(--t1)">${s.label}</span>
      <button class="manage-del-btn" onclick="deleteCustomSub('${s.id}')">
        <svg class="svg-icon" width="16" height="16" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Entfernen
      </button>
    </div>`).join('');
  c.innerHTML=`<div class="sheet-overlay" onclick="handleOverlay(event)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Substanzen verwalten</div>
      <div class="sheet-sub">Eigene Substanzen können hier entfernt werden.</div>
      ${rows.length?rows:`<div style="color:var(--t2);font-size:13px;padding:8px 0">Keine eigenen Substanzen vorhanden.</div>`}
      <div style="margin-top:16px">
        <button class="btn-cancel" style="width:100%" onclick="closeManage()">← Zurück</button>
      </div>
    </div>
  </div>`;}

function openManage(){manageOpen=true;renderModal();}
function closeManage(){manageOpen=false;renderModal();}

function deleteCustomSub(id){
  customSubs=customSubs.filter(s=>s.id!==id);
  Object.keys(data).forEach(k=>{data[k]=data[k].filter(sid=>sid!==id)});
  saveCustomSubs();saveData();
  modalSel=modalSel.filter(sid=>sid!==id);
  playDeselect();showToast('Substanz entfernt');
  if(customSubs.length===0)manageOpen=false;
  renderModal();
}

function addCustomSub(){
  const inp=document.getElementById('custom-input');
  const val=inp.value.trim();
  if(!val)return;
  if(getSubs().find(s=>s.label.toLowerCase()===val.toLowerCase())){showToast('Gibt es schon!');return;}
  const color=CUSTOM_COLORS[customSubs.length%CUSTOM_COLORS.length];
  customSubs.push({id:'custom_'+Date.now(),label:val,icon:'ti-circle-off',color,grad:`linear-gradient(135deg,#374151,${color})`});
  saveCustomSubs();inp.value='';
  playChime();showToast(`„${val}" hinzugefügt ✓`);renderModal();
}

function handleOverlay(e){if(e.target.classList.contains('sheet-overlay'))closeModal();}
function openModal(k){playPop();modalDate=k;modalSel=[...(data[k]||[])];manageOpen=false;renderModal();}
function closeModal(){modalDate=null;modalSel=[];manageOpen=false;renderModal();}
function toggleSub(id){const i=modalSel.indexOf(id);if(i>=0){modalSel.splice(i,1);playDeselect();}else{modalSel.push(id);playSelect();}renderModal();}

function saveEntry(){
  if(modalDate){data[modalDate]=[...modalSel];saveData();}
  const count=modalSel.length;
  const subs=getSubs();
  if(count===subs.length){mascotMood='cheer';playFanfare();setTimeout(()=>setMascotMood('cheer','saved_great'),400);showToast('Perfekter Tag! 🌟');}
  else if(count>0){mascotMood='proud';playSave();setTimeout(()=>setMascotMood('proud','saved_some'),300);showToast(`${count} eingetragen ✓`);}
  else{mascotMood='happy';playSave();setTimeout(()=>setMascotMood('happy','saved_none'),300);showToast('Eingetragen 📝');}
  modalDate=null;modalSel=[];renderModal();render();
}

function navigate(dir){playNav();viewM+=dir;if(viewM<0){viewM=11;viewY--}if(viewM>11){viewM=0;viewY++}render();}
function switchTab(tab){playNav();currentTab=tab;render();if(tab==='statistik')setTimeout(animateRings,100);}
function dismissBanner(){bannerDismissed=true;try{localStorage.setItem('clean_banner','1')}catch(e){}render();}

function toggleNotif(){
  if(!notifEnabled){
    if('Notification' in window&&Notification.permission!=='granted'){
      Notification.requestPermission().then(p=>{if(p==='granted'){notifEnabled=true;localStorage.setItem('clean_notif','1');scheduleNotif();render();showToast('Erinnerung aktiv ✓');}else{showToast('Benachrichtigungen blockiert');}});
    } else {notifEnabled=true;localStorage.setItem('clean_notif','1');scheduleNotif();render();showToast('Erinnerung aktiv ✓');}
  } else {notifEnabled=false;localStorage.setItem('clean_notif','0');if(notifTimer)clearTimeout(notifTimer);render();showToast('Erinnerung deaktiviert');}
}
function scheduleNotif(){
  if(!notifEnabled)return;
  const now=new Date(),next=new Date();
  next.setHours(22,0,0,0);if(next<=now)next.setDate(next.getDate()+1);
  notifTimer=setTimeout(()=>{
    if(notifEnabled&&'Notification' in window&&Notification.permission==='granted')
      new Notification('Clean – Stay Free',{body:'Iso vermisst dich! 🦀 Wie war dein Tag?'});
    scheduleNotif();
  },next-now);
}

// ════════════════════════════════════════
// BOOT
// ════════════════════════════════════════
loadData();
applyTheme();
initSplash();
render();
if(notifEnabled)scheduleNotif();
</script>
